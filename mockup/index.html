<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>UI Prototype Mockup</title>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
		<link rel="stylesheet" href="style.css" />
		<script src="qrcode.min.js" defer></script>
		<script src="script.js" defer></script>
	</head>
	<body>
		<main>
			<div class="bar">
				<!-- Power, clock and battery -->
				<div class="line battery-management power-management">
					<!-- Power and clock -->
					<div class="group panel double power-management">
						<button class="management-toggle" data-target="power-management" title="Power management">
							<i>power_settings_new</i>
							<span class="bold">12:43</span>
							<span class="small">May 17</span>
						</button>
					</div>

					<!-- Battery -->
					<div class="group panel battery-management">
						<button class="management-toggle" data-target="battery-management" title="Battery management">
							<i>battery_android_frame_5</i>
							<span>85%</span>
							<span class="small right menu-only hidden">2 h 23 min</span>
						</button>
					</div>
				</div>

				<!-- Battery graph -->
				<div class="line battery-management dedicated hidden" id="battery-graph-line">
					<div class="group panel battery-management" id="battery-graph"></div>
				</div>

				<!-- Power actions -->
				<div class="line power-management dedicated hidden">
					<div class="group panel power-management">
						<button title="Shut down">
							<i>close</i>
							<span>Shut down</span>
						</button>

						<button title="Sleep">
							<i>bedtime</i>
							<span>Sleep</span>
						</button>

						<button title="Restart">
							<i>restart_alt</i>
							<span>Restart</span>
						</button>
					</div>
				</div>

				<!-- Battery mode -->
				<div class="line battery-management dedicated hidden">
					<div class="group panel multi-toggle battery-management">
						<button class="active" title="Eco mode">
							<i>nest_eco_leaf</i>
							<span>Eco</span>
						</button>

						<button title="Auto mode">
							<i>magic_button</i>
							<span>Auto</span>
						</button>

						<button title="Performance mode">
							<i>mode_heat</i>
							<span>Perf</span>
						</button>
					</div>
				</div>

				<!-- Wifi and bluetooth -->
				<div class="line wifi-management bluetooth-management">
					<!-- Wifi -->
					<div class="group panel wifi-management">
						<button class="active management-toggle" data-target="wifi-management" title="Wifi network (connected to Livebox-C940)">
							<i>network_wifi</i>
							<span>Livebox-C940</span>
						</button>
					</div>

					<!-- Bluetooth -->
					<div class="group panel bluetooth-management">
						<button class="management-toggle" data-target="bluetooth-management" title="Bluetooth devices (not connected)">
							<i>bluetooth</i>
							<span>Not connected</span>
						</button>
					</div>
				</div>

				<!-- Wifi mode (List, Scan, Share) -->
				<div class="line wifi-management dedicated hidden">
					<div class="group panel multi-toggle wifi-management" id="wifi-tabs">
						<button class="active" data-view="0" title="Wifi networks list">
							<i>list</i>
							<span>List</span>
						</button>

						<button data-view="1" title="Scan QR code to connect to a wifi network">
							<i>qr_code_scanner</i>
							<span>Scan</span>
						</button>

						<button data-view="2" title="Share wifi network with a QR code">
							<i>qr_code</i>
							<span>Share</span>
						</button>
					</div>
				</div>

				<!-- Wifi views container -->
				<div class="line wifi-management dedicated hidden" id="wifi-views-container">
					<div id="wifi-views">
						<!-- Wifi networks list -->
						<div class="line list wifi-management" id="wifi-list">
							<div class="group panel toggle-control wifi-management">
								<button title="FreeWifi_secure">
									<i>signal_wifi_4_bar</i>
									<span>FreeWifi_secure</span>
								</button>

								<button title="SFR WiFi Public">
									<i>network_wifi_3_bar</i>
									<span>SFR WiFi Public</span>
								</button>

								<button title="Orange WiFi Pro">
									<i>network_wifi_2_bar</i>
									<span>Orange WiFi Pro</span>
								</button>

								<button title="Bouygues Telecom Wi-Fi">
									<i>network_wifi_1_bar</i>
									<span>Bouygues Telecom Wi-Fi</span>
								</button>

								<button title="FreeWifi_secure_5G">
									<i>network_wifi_1_bar</i>
									<span>FreeWifi_secure_5G</span>
								</button>

								<button title="FreeWifi_secure_5G">
									<i>network_wifi_1_bar</i>
									<span>FreeWifi_secure_5G</span>
								</button>
							</div>
						</div>

						<!-- Scan wifi QR code -->
						<div class="line wifi-management inactive-view" id="wifi-scan">
							<div class="group panel wifi-management">
								<img id="camera" src="./camera.png" />
								<div class="overlay-mask"></div>
							</div>
						</div>

						<!-- Share wifi QR code -->
						<div class="line wifi-management inactive-view" id="wifi-share">
							<div class="group panel wifi-management">
								<div class="wifi-qr-code"></div>
								<span class="small center-text no-trunc">hiEudZiR37d2nGdiz</span>
							</div>
						</div>
					</div>
				</div>

				<!-- Bluetooth devices list -->
				<div class="line list bluetooth-management dedicated hidden" id="bluetooth-list">
					<div class="group panel toggle-control bluetooth-management">
						<button title="AirPods Pro">
							<i>headphones</i>
							<span>AirPods Pro</span>
						</button>

						<button title="Logitech MX Master 3">
							<i>mouse</i>
							<span>MX Master 3</span>
						</button>

						<button title="Keychron K2">
							<i>keyboard</i>
							<span>Keychron K2</span>
						</button>

						<button title="Galaxy S21">
							<i>smartphone</i>
							<span>Galaxy S21</span>
						</button>
					</div>
				</div>

				<!-- Brightness -->
				<div class="line">
					<div class="group panel slider-control" title="Screen brightness">
						<i>brightness_medium</i>
						<input type="range" class="slider" min="0" max="100" value="50" style="--val: 50%" />
						<span>50%</span>
					</div>
				</div>

				<!-- Volume -->
				<div class="line">
					<div class="group panel slider-control" title="Volume">
						<i>volume_up</i>
						<input type="range" class="slider" min="0" max="100" value="75" style="--val: 75%" />
						<span>75%</span>
					</div>
				</div>

				<!-- Media -->
				<div class="line panel" id="media">
					<div class="album-art">
						<img src="https://i.scdn.co/image/ab67616d0000b273622aefd794f6fe4d8e714358" />
					</div>

					<div class="media-apps">
						<i class="toggle-album">keyboard_arrow_down</i>

						<div class="icon-list">
							<img src="./chrome.png" title="Google Chrome" />
							<img src="./spotify.png" title="Spotify" class="current" />
						</div>
					</div>

					<div class="media-info group">
						<span class="bold">Feel Good Inc.</span>
						<span class="small">Gorillaz</span>
					</div>

					<div class="group slider-control">
						<input type="range" class="slider" min="0" max="100" value="75" style="--val: 75%" />
					</div>

					<div class="group media-buttons">
						<button title="Previous track" class="centered">
							<i>skip_previous</i>
						</button>

						<button title="Play/Pause" class="centered">
							<i>play_arrow</i>
						</button>

						<button title="Next track" class="centered">
							<i>skip_next</i>
						</button>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
